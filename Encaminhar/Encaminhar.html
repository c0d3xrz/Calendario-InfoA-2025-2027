<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Encaminhar Registros InfoA 2025 - 2027</title>
  <link rel="shortcut icon" href="../INFO_A_2025-2027__LOGO-PDF_-AZUL_ESCURO-removebg-preview.png" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Nunito", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0b1829;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(29, 161, 242, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(168, 85, 247, 0.06) 0%, transparent 50%);
    }

    .card {
      background: #132236;
      border: 1.5px solid rgba(29, 161, 242, 0.18);
      border-radius: 16px;
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      max-width: 480px;
      width: 90%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.3);
    }

    .card h1 {
      font-size: 22px;
      font-weight: 900;
      color: #e8f4fd;
    }

    .card h1 span {
      color: #1da1f2;
    }

    .card p {
      font-size: 14px;
      font-weight: 600;
      color: #7aadcc;
      line-height: 1.6;
    }

    #sendBtn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      max-width: 320px;
      padding: 14px 0;
      border-radius: 12px;
      border: none;
      background: #25d366;
      color: #fff;
      font-family: "Nunito", sans-serif;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 4px 18px rgba(37, 211, 102, 0.3);
      letter-spacing: 0.3px;
    }

    #sendBtn:hover {
      background: #1eaf54;
      transform: scale(1.03);
      box-shadow: 0 6px 24px rgba(37, 211, 102, 0.4);
    }

    #sendBtn:active {
      transform: scale(0.97);
    }

    #sendBtn:disabled {
      background: #1a2f47;
      color: #7aadcc;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    #weekBtn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      max-width: 320px;
      padding: 14px 0;
      border-radius: 12px;
      border: 2px solid rgba(29, 161, 242, 0.4);
      background: rgba(29, 161, 242, 0.06);
      color: #1da1f2;
      font-family: "Nunito", sans-serif;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s, border-color 0.15s;
    }

    #weekBtn:hover {
      background: rgba(29, 161, 242, 0.12);
      border-color: #1da1f2;
      transform: scale(1.03);
    }

    #weekBtn:active {
      transform: scale(0.97);
    }

    #weekBtn:disabled {
      background: #1a2f47;
      color: #7aadcc;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
      border-color: transparent;
    }

    .card {
      position: relative;
      padding-top: 56px;
    }

    #backBtn {
      position: absolute;
      top: 16px;
      left: 16px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      cursor: pointer;
      padding: 0;
      transition: transform 0.15s;
    }

    #backBtn:hover {
      transform: scale(1.1);
    }

    #backBtn:active {
      transform: scale(0.95);
    }

    #backBtn svg path {
      stroke: #7aadcc;
      transition: stroke 0.15s;
    }

    #backBtn:hover svg path {
      stroke: #1da1f2;
    }

    .emoji-textarea {
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <button id="backBtn" title="Voltar">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M14.9998 19.9201L8.47984 13.4001C7.70984 12.6301 7.70984 11.3701 8.47984 10.6001L14.9998 4.08008" stroke="#292D32" stroke-width="1.5" stroke-miterlimit="10" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <h1>Encaminhar <span>Registros</span></h1>
    <p>
      Busca todos os registros do calend&#225;rio e os <strong>encaminha
      formatados</strong> via WhatsApp.
    </p>
    <button id="sendBtn">&#128233; Encaminhar Registros</button>
    <button id="weekBtn">&#128233; Encaminhar Semana Atual</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getFirestore,
      collection,
      getDocs,
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const app = initializeApp({
      apiKey: "AIzaSyAae396ryXNCC6VfEJamBiHYhAT3SYYcXA",
      authDomain: "calendarioinfoa.firebaseapp.com",
      projectId: "calendarioinfoa",
      storageBucket: "calendarioinfoa.firebasestorage.app",
      messagingSenderId: "530293189709",
      appId: "1:530293189709:web:1d9da328eddc207d438004"
    });

    const db = getFirestore(app);

    const btn = document.getElementById("sendBtn");

    const monthNames = [
      "", "Janeiro", "Fevereiro", "Mar\u00E7o", "Abril",
      "Maio", "Junho", "Julho", "Agosto",
      "Setembro", "Outubro", "Novembro", "Dezembro"
    ];

    const WA_PIN = "\uD83D\uDCCC";
    const WA_BOX = "\uD83D\uDCE6";
    const WA_ARROW = "\u21AA\uFE0F";
    const WA_CALENDAR = "\uD83D\uDCC5";
    const WA_SEND = "\uD83D\uDCE4";
    const WA_HOURGLASS = "\u23F3";

    document.getElementById("backBtn").addEventListener("click", () => {
      window.location.href = "../InfoA.html";
    });

    async function sendFiltered(filterFn, allText, doneText) {
      var el = event.target;
      el.disabled = true;
      el.textContent = WA_HOURGLASS + " Buscando registros...";

      try {
        const snap = await getDocs(collection(db, "events"));

        const events = [];
        snap.forEach((d) => events.push(d.data()));

        if (events.length === 0) {
          alert("Nenhum registro encontrado no banco de dados.");
          el.disabled = false;
          el.textContent = WA_SEND + " " + allText;
          return;
        }

        // Filter
        const filtered = events.filter(filterFn);

        if (filtered.length === 0) {
          alert("Nenhum registro encontrado para o per\u00EDodo selecionado.");
          el.disabled = false;
          el.textContent = WA_SEND + " " + allText;
          return;
        }

        // Sort events by date (day-month)
        filtered.sort((a, b) => {
          const [ad, am] = a.date.split("-").map(Number);
          const [bd, bm] = b.date.split("-").map(Number);
          if (am !== bm) return am - bm;
          return ad - bd;
        });

        // Format message for WhatsApp
        var msg = "\uD83D\uDCE3 *Recados Info A 2026*\n\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\n";

        var currentDateKey = "";

        filtered.forEach(function(ev) {
          if (ev.date !== currentDateKey) {
            currentDateKey = ev.date;
            var day = parseInt(currentDateKey.split("-")[0]);
            var month = parseInt(currentDateKey.split("-")[1]);
            var dateStr = day + " de " + monthNames[month];
            msg += "\n" + WA_CALENDAR + " *" + dateStr + "*\n";
          }

          msg += "\n" + WA_PIN + "*Mat\u00E9ria* \u2014 " + (ev.subject || "\u2014") + "\n";
          msg += WA_BOX + "*Tipo* \u2014 " + (ev.type || "\u2014") + "\n";
          msg += WA_ARROW + "*Descri\u00E7\u00E3o* \u2014 " + (ev.text || "\u2014") + "\n";
          msg += "\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n";
        });

        // Open WhatsApp: app on mobile, Web on desktop
        var encoded = encodeURIComponent(msg);
        var isMobile = /Android|iPhone|iPad|iPod|Windows Phone/i.test(navigator.userAgent);
        var url = isMobile
          ? "whatsapp://send?text=" + encoded
          : "https://web.whatsapp.com/send?text=" + encoded;
        window.open(url, "_blank");

      } catch (err) {
        console.error(err);
        alert("Erro ao buscar registros. Tente novamente.");
      }

      el.disabled = false;
      el.textContent = WA_SEND + " " + doneText;
    }

    // All records (from today onwards)
    btn.addEventListener("click", async () => {
      const today = new Date();
      const todayDay = today.getDate();
      const todayMonth = today.getMonth() + 1;

      await sendFiltered(
        (ev) => {
          const [ed, em] = ev.date.split("-").map(Number);
          if (em !== todayMonth) return em > todayMonth;
          return ed >= todayDay;
        },
        "Encaminhar Registros",
        "Encaminhar Registros"
      );
    });

    // Current week (Sunday to Saturday)
    const weekBtn = document.getElementById("weekBtn");
    weekBtn.addEventListener("click", async () => {
      const today = new Date();
      const dayOfWeek = today.getDay(); // 0 = Sunday
      const startDate = new Date(today);
      startDate.setDate(today.getDate() - dayOfWeek);

      const endDate = new Date(startDate);
      endDate.setDate(startDate.getDate() + 6);

      await sendFiltered(
        (ev) => {
          const [ed, em] = ev.date.split("-").map(Number);
          const eventDate = new Date(2026, em - 1, ed);
          return eventDate >= new Date(startDate.getFullYear(), startDate.getMonth(), startDate.getDate())
              && eventDate <= new Date(endDate.getFullYear(), endDate.getMonth(), endDate.getDate());
        },
        "Encaminhar Semana Atual",
        "Encaminhar Semana Atual"
      );
    });
  </script>
</body>
</html>
