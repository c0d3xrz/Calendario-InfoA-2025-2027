<!doctype html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Calendário Info A 2026</title>
<link rel="shortcut icon" href="./INFO_A_2025-2027__LOGO-PDF_-AZUL_ESCURO-removebg-preview.png" type="image/x-icon">

<style>
body::-webkit-scrollbar {
    display: none;
}
body { font-family: Arial; margin: 0; background: #0f172a; color: white; }
header { text-align: center; padding: 15px; font-size: 22px; background: #1e293b; width: 100%;}

/* CALENDÁRIO */
#calendar {
  width: 76%; /* ALTERADO: já inicia reduzido */
  display: grid;
  grid-template-columns: repeat(3, 1fr); /* ALTERADO: 3 por linha */
  gap: 15px;
  padding: 20px;
  transition: all 0.3s ease;
  padding-right: 350px
}


.month { background: #1e293b; border-radius: 15px; padding: 10px; }
.month-title { text-align: center; font-weight: bold; margin-bottom: 10px; }

.days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }

.day-name { font-size: 12px; text-align: center; opacity: 0.7; }

.day {
  background: #334155;
  border-radius: 8px;
  padding: 5px;
  min-height: 50px;
  cursor: pointer;
}

.day.past { opacity: 0.5; }

/* CORES */
.red { background: #ef4444; }
.blue { background: #3b82f6; }
.green { background: #22c55e; }
.purple { background: #a855f7; }
.yellow { background: #eab308; color: black; }
.black { background: #000; }

/* SIDEBAR */
#side {
  position: fixed;
  top: 0;
  right: 0;
  width: 320px; /* ALTERADO: já inicia aberta */
  height: 100%;
  background: #1e293b;
  transition: 0.3s;
  overflow: hidden;
  z-index: 1000;
}

#side.active { width: 320px; }

/* HEADER FIXO */
.side-header {
  position: sticky;
  top: 0;
  background: #1e293b;
  padding: 10px;
  border-bottom: 1px solid #334155;
}

/* SCROLL */
.side-content {
  height: calc(100vh - 70px);
  overflow-y: auto;
  padding: 10px;
}

/* EVENTOS */
.event-card {
  border-radius: 10px;
  padding: 10px;
  margin-top: 10px;
}

.event-header {
  display: flex;
  justify-content: space-between;
  font-weight: bold;
}

.event-type {
  font-size: 12px;
  padding: 2px 6px;
  border-radius: 5px;
  background: rgba(0,0,0,0.3);
}

.delete-btn {
  margin-top: 8px;
  background: rgb(255, 52, 52);
  border: solid 1px black;
  padding: 5px;
  border-radius: 5px;
  cursor: pointer;
  width: 100%;
}

/* BOTÃO */
#actionBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: #22c55e;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 22px;
  z-index: 9999;
}


/* MODAIS */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: none;
  align-items: center;
  justify-content: center;
}

.box {
  background: #1e293b;
  padding: 20px;
  border-radius: 10px;
  width: 300px;
}

input, select, button {
  width: 100%;
  margin-top: 10px;
  padding: 8px;
  border-radius: 6px;
  border: none;
}

input{
  width: 95%;
}

</style>
</head>

<body>

<header>Calendário Info A - 2026</header>

<div id="calendar"></div>
<div id="side"></div>

<div id="actionBtn">🔒</div>

<!-- LOGIN -->
<div id="loginModal" class="modal">
  <div class="box">
    <h3>Modo Líder</h3>
    <input id="password" placeholder="Senha">
    <button onclick="login()">Entrar</button>
    <button onclick="closeLogin()">Cancelar</button>
  </div>
</div>

<!-- ADD -->
<div id="modal" class="modal">
  <div class="box">
    <h3>Novo Registro</h3>
    <select id="type">
      <option>Prova</option>
      <option>Trabalho</option>
      <option>Tarefa</option>
      <option>Evento</option>
      <option>Aviso</option>
    </select>
    <input id="subject" placeholder="Matéria">
    <input id="text" placeholder="Descrição">
    <button onclick="saveEvent()">Salvar</button>
    <button onclick="closeModal()">Cancelar</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyAae396ryXNCC6VfEJamBiHYhAT3SYYcXA", 
  authDomain: "calendarioinfoa.firebaseapp.com", 
  projectId: "calendarioinfoa",
});

const db = getFirestore(app);

let isLeader = false;
let eventsMap = {};
let selectedDay, currentMonth, currentDay;

const calendar = document.getElementById("calendar");
const side = document.getElementById("side");
const actionBtn = document.getElementById("actionBtn");

const months = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
const days = ["Dom","Seg","Ter","Qua","Qui","Sex","Sab"];

/* CALENDÁRIO */
months.forEach((m,i)=>{
  let mDiv=document.createElement("div");
  mDiv.className="month";
  mDiv.innerHTML=`<div class='month-title'>${m}</div>`;

  let grid=document.createElement("div");
  grid.className="days-grid";

  days.forEach(d=>{
    let el=document.createElement("div");
    el.className="day-name";
    el.innerText=d;
    grid.appendChild(el);
  });

  let f=new Date(2026,i,1).getDay();
  let t=new Date(2026,i+1,0).getDate();

  for(let k=0;k<f;k++) grid.appendChild(document.createElement("div"));

  for(let d=1;d<=t;d++){
    let div=document.createElement("div");
    div.className="day";
    div.innerHTML=`<b>${d}</b>`;

    let key=`${d}-${i+1}`;
    div.dataset.date=key;
    div.onclick=()=>openSide(key,i,d);

    grid.appendChild(div);
  }

  mDiv.appendChild(grid);
  calendar.appendChild(mDiv);
});

function getColor(type){
  return {Prova:"red",Trabalho:"blue",Tarefa:"green",Evento:"purple",Aviso:"yellow"}[type];
}

function openSide(key,m,d){
  selectedDay=key;
  currentMonth=m;
  currentDay=d;

  side.classList.add("active");
  calendar.classList.add("shrink");

  renderSide();
}


function renderSide(){
  let html=`
  <div class="side-header">
    <div style="display:flex;justify-content:space-between;">
      <h3>${currentDay}/${currentMonth+1}</h3>
    </div>
  </div>
  <div class="side-content">
  `;

  if(eventsMap[selectedDay]){
    eventsMap[selectedDay].forEach(ev=>{
      html+=`
      <div class="event-card ${getColor(ev.type)}">
        <div class="event-header">
          <span>${ev.subject}</span>
          <span class="event-type">${ev.type}</span>
        </div>
        <div>${ev.text}</div>
        ${isLeader ? `<button class="delete-btn" onclick="deleteEvent('${ev.id}')">Apagar</button>` : ""}
      </div>`;
    });
  }

  if(isLeader){
    html+=`<button onclick="openModal()">Adicionar</button>`;
  }

  html+=`</div>`;
  side.innerHTML=html;
}

window.deleteEvent=async(id)=>{
  await deleteDoc(doc(db,"events",id));
  loadEvents();
  renderSide();
};

window.openModal=()=> modal.style.display="flex";

window.closeModal=()=>{
  modal.style.display="none";
  type.value="Prova";
  subject.value="";
  text.value="";
};

window.saveEvent=async()=>{
  await addDoc(collection(db,"events"),{
    date:selectedDay,
    type:type.value,
    subject:subject.value,
    text:text.value
  });

  closeModal();
  loadEvents();
};

actionBtn.onclick=()=>{
  if(isLeader){
    isLeader=false;
    actionBtn.innerHTML="🔒";
  } else {
    loginModal.style.display="flex";
  }
};

window.login=()=>{
  if(password.value==="infoa"){
    isLeader=true;
    actionBtn.innerHTML="🚪";
    closeLogin();
  }
};

window.closeLogin=()=>{
  loginModal.style.display="none";
  password.value="";
};

async function loadEvents(){
  let snap=await getDocs(collection(db,"events"));
  eventsMap={};

  snap.forEach(d=>{
    let v=d.data();
    if(!eventsMap[v.date]) eventsMap[v.date]=[];
    eventsMap[v.date].push({...v,id:d.id});
  });

  let today = new Date();
  today.setHours(0,0,0,0);
  let todayKey = `${today.getDate()}-${today.getMonth()+1}`;

  document.querySelectorAll(".day").forEach(div=>{
    let key=div.dataset.date;
    if(!key) return;

    div.className="day";

    if(eventsMap[key]){
      if(eventsMap[key].length>1){
        div.classList.add("black");
      } else {
        div.classList.add(getColor(eventsMap[key][0].type));
      }
    }

    let [day,month]=key.split("-");
    let date=new Date(2026,month-1,day);

    if(date < today){
      div.classList.add("past");
    }
  });

  /* ALTERADO: abre automaticamente no dia atual */
  let m = today.getMonth();
  let d = today.getDate();
  openSide(todayKey, m, d);
}

loadEvents();
</script>

</body>
</html>
