<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta property="og:title" content="Calendário InfoA 2025 - 2027">

    <title>Calendário InfoA 2025 - 2027</title>
    <link
      rel="shortcut icon"
      href="./INFO_A_2025-2027__LOGO-PDF_-AZUL_ESCURO-removebg-preview.png"
      type="image/x-icon"
    />
    <link

      rel="stylesheet"
    />

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --blue: #1da1f2;
        --blue-dark: #0d6ebd;
        --blue-deep: #0a3d6b;
        --blue-light: #e6f4fd;
        --blue-mid: #b5d9f7;
        --bg: #0b1829;
        --surface: #132236;
        --surface2: #1a2f47;
        --surface3: #203654;
        --text: #e8f4fd;
        --text-muted: #7aadcc;
        --border: rgba(29, 161, 242, 0.18);
        --red: #ef4444;
        --green: #22c55e;
        --purple: #a855f7;
        --yellow: #facc15;
        --orange: #f97316;
        --radius: 16px;
        --radius-sm: 10px;
        --sidebar-w: 340px;
      }

      html,
      body {
        height: 100%;
      }

      body {
        font-family: "Nunito", sans-serif;
        background: var(--bg);
        color: var(--text);
        overflow-x: hidden;
        scrollbar-width: thin;
        scrollbar-color: var(--blue-dark) var(--surface);
      }

      body::-webkit-scrollbar {
        width: 6px;
      }
      body::-webkit-scrollbar-track {
        background: var(--surface);
      }
      body::-webkit-scrollbar-thumb {
        background: var(--blue-dark);
        border-radius: 3px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 24px;
        background: var(--surface);
        border-bottom: 2px solid var(--border);

        position: fixed; /* muda aqui */
        top: 0;
        left: 0; /* importante */
        width: 100%; /* importante */
        z-index: 200;
      }

      .header-logo {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .header-logo img {
        width: 44px;
        height: 44px;
        object-fit: contain;
      }

      .header-title {
        font-size: 20px;
        font-weight: 900;
        color: var(--blue);
        letter-spacing: -0.5px;
      }

      .header-title span {
        color: var(--text-muted);
        font-weight: 600;
        font-size: 14px;
        margin-left: 4px;
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      /* ── STREAK ── */
      /* ── LOCK BTN ── */
      #actionBtn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 42px;
        height: 42px;
        border-radius: 50%;
        background: var(--blue);
        border: none;
        cursor: pointer;
        font-size: 18px;
        color: white;
        font-weight: 900;
        transition:
          transform 0.15s,
          background 0.15s;
        box-shadow: 0 4px 14px rgba(29, 161, 242, 0.35);
      }

      #actionBtn:hover {
        transform: scale(1.08);
        background: var(--blue-dark);
      }
      #actionBtn:active {
        transform: scale(0.96);
      }

      /* ── LAYOUT ── */
      #app {
        display: flex;
        min-height: calc(100vh - 70px);
      }

      /* ── CALENDAR ── */
      #calendar {
        flex: 1;
        padding: 20px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 14px;
        transition: all 0.3s ease;
      }

      #calendar.shrink {
        padding-right: calc(var(--sidebar-w) + 20px);
      }

      /* ── MONTH CARD ── */
      .month {
        background: var(--surface);
        border: 1.5px solid var(--border);
        border-radius: var(--radius);
        padding: 14px;
        transition: box-shadow 0.2s;
      }

      .month:hover {
        box-shadow: 0 4px 24px rgba(29, 161, 242, 0.12);
      }

      .month-title {
        text-align: center;
        font-size: 15px;
        font-weight: 900;
        color: var(--blue);
        text-transform: uppercase;
        letter-spacing: 1.5px;
        margin-bottom: 10px;
        padding-bottom: 8px;
        border-bottom: 1.5px solid var(--border);
      }

      .days-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 3px;
      }

      .day-name {
        font-size: 10px;
        text-align: center;
        color: var(--text-muted);
        font-weight: 700;
        padding: 4px 0;
        letter-spacing: 0.5px;
      }

      .day {
        border-radius: var(--radius-sm);
        padding: 5px 3px;
        min-height: 46px;
        cursor: pointer;
        background: var(--surface2);
        border: 1.5px solid transparent;
        transition:
          transform 0.12s,
          border-color 0.12s,
          box-shadow 0.12s;
        position: relative;
        overflow: hidden;
      }

      .day:hover {
        transform: scale(1.06);
        border-color: var(--blue);
        box-shadow: 0 2px 12px rgba(29, 161, 242, 0.25);
        z-index: 2;
      }

      .day b {
        display: block;
        font-size: 12px;
        font-weight: 800;
        text-align: center;
        color: var(--text);
      }

      .day.today-ring {
        border-color: var(--blue) !important;
        box-shadow: 0 0 0 2px rgba(29, 161, 242, 0.4) !important;
      }

      .day.past {
        opacity: 0.4;
      }

      /* event dots */
      .dots-row {
        display: flex;
        gap: 2px;
        justify-content: center;
        flex-wrap: wrap;
        margin-top: 3px;
      }

      .dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      /* ── COLORED DAYS ── */
      .day.ev-red {
        background: rgba(239, 68, 68, 0.18);
        border-color: rgba(239, 68, 68, 0.4);
      }
      .day.ev-blue {
        background: rgba(29, 161, 242, 0.15);
        border-color: rgba(29, 161, 242, 0.4);
      }
      .day.ev-green {
        background: rgba(34, 197, 94, 0.15);
        border-color: rgba(34, 197, 94, 0.4);
      }
      .day.ev-purple {
        background: rgba(168, 85, 247, 0.15);
        border-color: rgba(168, 85, 247, 0.4);
      }
      .day.ev-yellow {
        background: rgba(250, 204, 21, 0.15);
        border-color: rgba(250, 204, 21, 0.4);
      }
      .day.ev-multi {
        background: var(--surface3);
        border-color: rgba(29, 161, 242, 0.3);
      }

      /* ── SIDEBAR ── */
      #side {
        position: fixed;
        top: 70px;
        right: 0;
        width: 0;
        height: calc(100vh - 70px);
        background: var(--surface);
        border-left: 1.5px solid var(--border);
        transition: width 0.3s ease;
        overflow: hidden;
        z-index: 100;
      }

      #side.active {
        width: var(--sidebar-w);
      }

      .side-inner {
        width: var(--sidebar-w);
        height: 100%;
        display: flex;
        flex-direction: column;
      }

      .side-header {
        padding: 16px;
        background: var(--surface2);
        border-bottom: 1.5px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
      }

      .side-date {
        font-size: 20px;
        font-weight: 900;
        color: var(--text);
      }

      .side-date-sub {
        font-size: 12px;
        color: var(--text-muted);
        font-weight: 600;
        margin-top: 2px;
      }

      .close-btn {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        background: var(--surface3);
        border: 1.5px solid var(--border);
        cursor: pointer;
        color: var(--text-muted);
        font-size: 18px;
        font-weight: 900;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s;
        font-family: inherit;
      }

      .close-btn:hover {
        background: var(--surface);
        color: var(--text);
      }

      .side-scroll {
        flex: 1;
        overflow-y: auto;
        padding: 14px;
        scrollbar-width: thin;
        scrollbar-color: var(--blue-dark) transparent;
      }

      .side-empty {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        height: 140px;
        color: var(--text-muted);
        font-size: 14px;
        font-weight: 600;
      }

      /* ── EVENT CARD ── */
      .event-card {
        border-radius: var(--radius-sm);
        padding: 12px 14px;
        margin-bottom: 10px;
        border: 1.5px solid transparent;
        animation: slideIn 0.2s ease;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .ev-card-red {
        background: rgba(239, 68, 68, 0.12);
        border-color: rgba(239, 68, 68, 0.35);
      }
      .ev-card-blue {
        background: rgba(29, 161, 242, 0.1);
        border-color: rgba(29, 161, 242, 0.35);
      }
      .ev-card-green {
        background: rgba(34, 197, 94, 0.1);
        border-color: rgba(34, 197, 94, 0.35);
      }
      .ev-card-purple {
        background: rgba(168, 85, 247, 0.1);
        border-color: rgba(168, 85, 247, 0.35);
      }
      .ev-card-yellow {
        background: rgba(250, 204, 21, 0.1);
        border-color: rgba(250, 204, 21, 0.35);
      }

      .ev-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 6px;
        gap: 8px;
      }

      .ev-subject {
        font-size: 14px;
        font-weight: 800;
        color: var(--text);
        flex: 1;
      }

      .ev-badge {
        font-size: 10px;
        font-weight: 800;
        padding: 3px 9px;
        border-radius: 20px;
        white-space: nowrap;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }

      .badge-red {
        background: rgba(239, 68, 68, 0.25);
        color: #fca5a5;
      }
      .badge-blue {
        background: rgba(29, 161, 242, 0.25);
        color: #7dd3fc;
      }
      .badge-green {
        background: rgba(34, 197, 94, 0.25);
        color: #86efac;
      }
      .badge-purple {
        background: rgba(168, 85, 247, 0.25);
        color: #d8b4fe;
      }
      .badge-yellow {
        background: rgba(250, 204, 21, 0.25);
        color: #fef08a;
      }

      .ev-desc {
        font-size: 12px;
        color: var(--text-muted);
        font-weight: 600;
        line-height: 1.5;
      }

      .delete-btn {
        margin-top: 10px;
        width: 100%;
        padding: 7px;
        border-radius: var(--radius-sm);
        border: 1.5px solid rgba(239, 68, 68, 0.4);
        background: rgba(239, 68, 68, 0.1);
        color: #fca5a5;
        font-size: 12px;
        font-weight: 800;
        cursor: pointer;
        font-family: inherit;
        transition: background 0.15s;
      }

      .delete-btn:hover {
        background: rgba(239, 68, 68, 0.22);
      }

      /* ── ADD BTN ── */
      .add-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 100%;
        padding: 12px;
        margin-top: 4px;
        border-radius: var(--radius-sm);
        border: 2px dashed rgba(29, 161, 242, 0.4);
        background: rgba(29, 161, 242, 0.06);
        color: var(--blue);
        font-size: 14px;
        font-weight: 800;
        cursor: pointer;
        font-family: inherit;
        transition:
          background 0.15s,
          border-color 0.15s;
      }

      .add-btn:hover {
        background: rgba(29, 161, 242, 0.12);
        border-color: rgba(29, 161, 242, 0.7);
      }

      /* ── MODAIS ── */
      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        padding: 20px;
      }

      .modal-backdrop.open {
        display: flex;
      }

      .modal-box {
        background: var(--surface);
        border: 1.5px solid var(--border);
        border-radius: var(--radius);
        padding: 24px;
        width: 100%;
        max-width: 360px;
        animation: popIn 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      @keyframes popIn {
        from {
          opacity: 0;
          transform: scale(0.88);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      .modal-title {
        font-size: 18px;
        font-weight: 900;
        color: var(--text);
        margin-bottom: 18px;
      }

      .modal-title span {
        color: var(--blue);
      }

      .field-label {
        font-size: 11px;
        font-weight: 800;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 5px;
        margin-top: 12px;
      }

      input,
      select {
        width: 100%;
        padding: 10px 12px;
        border-radius: var(--radius-sm);
        border: 1.5px solid var(--border);
        background: var(--surface2);
        color: var(--text);
        font-size: 14px;
        font-family: "Nunito", sans-serif;
        font-weight: 600;
        outline: none;
        transition: border-color 0.15s;
      }

      input:focus,
      select:focus {
        border-color: var(--blue);
      }

      select option {
        background: var(--surface2);
      }

      .modal-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 20px;
      }

      .btn-confirm {
        padding: 11px;
        border-radius: var(--radius-sm);
        border: none;
        background: var(--blue);
        color: white;
        font-size: 14px;
        font-weight: 900;
        font-family: "Nunito", sans-serif;
        cursor: pointer;
        transition:
          background 0.15s,
          transform 0.1s;
      }

      .btn-confirm:hover {
        background: var(--blue-dark);
      }
      .btn-confirm:active {
        transform: scale(0.97);
      }

      .btn-cancel {
        padding: 11px;
        border-radius: var(--radius-sm);
        border: 1.5px solid var(--border);
        background: var(--surface2);
        color: var(--text-muted);
        font-size: 14px;
        font-weight: 800;
        font-family: "Nunito", sans-serif;
        cursor: pointer;
        transition: background 0.15s;
      }

      .btn-cancel:hover {
        background: var(--surface3);
        color: var(--text);
      }

      /* ── LEGEND ── */
      .legend {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 10px 20px 14px;
        justify-content: center;
        margin-top: 75px;
      }

      .legend-item {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 11px;
        font-weight: 700;
        color: var(--text-muted);
      }

      .legend-dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
      }

      /* ── MOBILE ── */
      @media (max-width: 768px) {
        :root {
          --sidebar-w: 100vw;
        }

        header {
          padding: 10px 14px;
        }
        .header-title {
          font-size: 16px;
        }
        .header-logo img {
          width: 36px;
          height: 36px;
        }

        #calendar {
          grid-template-columns: 1fr;
          padding: 12px;
          gap: 12px;
        }

        #calendar.shrink {
          padding-right: 12px;
        }

        .month {
          padding: 12px;
        }
        .month-title {
          font-size: 18px;
          letter-spacing: 2px;
          margin-bottom: 12px;
        }

        .days-grid {
          gap: 4px;
        }
        .day-name {
          font-size: 11px;
          padding: 5px 0;
        }

        .day {
          min-height: 42px;
          padding: 5px 2px;
          border-radius: 8px;
        }

        .day b {
          font-size: 13px;
        }
        .dot {
          width: 4px;
          height: 4px;
        }

        #side {
          top: 0;
          height: 100vh;
          border-left: none;
          border-top: 1.5px solid var(--border);
        }

        #side.active {
          width: 100vw;
          z-index: 300;
        }

        .side-inner {
          width: 100vw;
        }

        .streak-pill {
          display: none;
        }
      }

      @media (min-width: 769px) and (max-width: 1100px) {
        #calendar {
          grid-template-columns: repeat(2, 1fr);
        }
      }
    </style>
  </head>

  <body>
    <header>
      <div class="header-logo">
        <img
          src="./INFO_A_2025-2027__LOGO-PDF_-AZUL_ESCURO-removebg-preview.png"
          alt="InfoA"
        />
        <div>
          <div class="header-title">InfoA <span>2026</span></div>
        </div>
      </div>
      <div class="header-right">
        <button id="actionBtn" title="Modo Líder">🔒</button>
      </div>
    </header>

    <div class="legend">
      <div class="legend-item">
        <div class="legend-dot" style="background: #ef4444"></div>
        Prova
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background: #1da1f2"></div>
        Trabalho
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background: #22c55e"></div>
        Tarefa
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background: #a855f7"></div>
        Evento
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background: #facc15"></div>
        Aviso
      </div>
    </div>

    <div id="app">
      <div id="calendar"></div>
      <div id="side"></div>
    </div>

    <!-- LOGIN -->
    <div id="loginModal" class="modal-backdrop">
      <div class="modal-box">
        <div class="modal-title">Modo <span>Líder</span></div>
        <div class="field-label">Senha</div>
        <input id="password" type="password" placeholder="Digite a senha" />
        <div class="modal-actions">
          <button class="btn-confirm" onclick="login()">Entrar</button>
          <button class="btn-cancel" onclick="closeLogin()">Cancelar</button>
        </div>
      </div>
    </div>

    <!-- ADD EVENT -->
    <div id="modal" class="modal-backdrop">
      <div class="modal-box">
        <div class="modal-title">Novo <span>Registro</span></div>
        <div class="field-label">Tipo</div>
        <select id="type">
          <option>Prova</option>
          <option>Trabalho</option>
          <option>Tarefa</option>
          <option>Evento</option>
          <option>Aviso</option>
        </select>
        <div class="field-label">Matéria</div>
        <input id="subject" placeholder="Ex: Matemática" />
        <div class="field-label">Descrição</div>
        <input id="text" placeholder="Ex: Capítulos 1 ao 5" />
        <div class="modal-actions">
          <button class="btn-confirm" onclick="saveEvent()">Salvar</button>
          <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
        </div>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
      import {
        getFirestore,
        collection,
        addDoc,
        getDocs,
        deleteDoc,
        doc,
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

      const app = initializeApp({
        apiKey: "AIzaSyAae396ryXNCC6VfEJamBiHYhAT3SYYcXA",
        authDomain: "calendarioinfoa.firebaseapp.com",
        projectId: "calendarioinfoa",
      });

      const db = getFirestore(app);

      let isLeader = false;
      let eventsMap = {};
      let selectedDay, currentMonth, currentDay;

      const calendar = document.getElementById("calendar");
      const side = document.getElementById("side");
      const actionBtn = document.getElementById("actionBtn");

      const monthNames = [
        "Janeiro",
        "Fevereiro",
        "Março",
        "Abril",
        "Maio",
        "Junho",
        "Julho",
        "Agosto",
        "Setembro",
        "Outubro",
        "Novembro",
        "Dezembro",
      ];
      const monthShort = [
        "Jan",
        "Fev",
        "Mar",
        "Abr",
        "Mai",
        "Jun",
        "Jul",
        "Ago",
        "Set",
        "Out",
        "Nov",
        "Dez",
      ];
      const dayNames = ["Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sáb"];

      const typeColor = {
        Prova: "red",
        Trabalho: "blue",
        Tarefa: "green",
        Evento: "purple",
        Aviso: "yellow",
      };
      const dotColor = {
        red: "#ef4444",
        blue: "#1da1f2",
        green: "#22c55e",
        purple: "#a855f7",
        yellow: "#facc15",
      };

      /* BUILD CALENDAR */
      monthShort.forEach((m, i) => {
        const mDiv = document.createElement("div");
        mDiv.className = "month";

        mDiv.innerHTML = `<div class="month-title">${monthNames[i]}</div>`;

        const grid = document.createElement("div");
        grid.className = "days-grid";

        dayNames.forEach((d) => {
          const el = document.createElement("div");
          el.className = "day-name";
          el.innerText = d;
          grid.appendChild(el);
        });

        const firstDay = new Date(2026, i, 1).getDay();
        const totalDays = new Date(2026, i + 1, 0).getDate();

        for (let k = 0; k < firstDay; k++)
          grid.appendChild(document.createElement("div"));

        for (let d = 1; d <= totalDays; d++) {
          const div = document.createElement("div");
          div.className = "day";
          div.innerHTML = `<b>${d}</b><div class="dots-row" id="dots-${d}-${i + 1}"></div>`;
          const key = `${d}-${i + 1}`;
          div.dataset.date = key;
          div.onclick = () => openSide(key, i, d);
          grid.appendChild(div);
        }

        mDiv.appendChild(grid);
        calendar.appendChild(mDiv);
      });

      /* SIDE */
      function openSide(key, m, d) {
        selectedDay = key;
        currentMonth = m;
        currentDay = d;
        side.classList.add("active");
        calendar.classList.add("shrink");
        renderSide();
      }

      function closeSide() {
        side.classList.remove("active");
        calendar.classList.remove("shrink");
      }

      function renderSide() {
        const events = eventsMap[selectedDay] || [];
        const weekday = new Date(
          2026,
          currentMonth,
          currentDay,
        ).toLocaleDateString("pt-br", { weekday: "long" });

        let html = `<div class="side-inner">
        <div class="side-header">
          <div>
            <div class="side-date">${currentDay} de ${monthNames[currentMonth]}</div>
            <div class="side-date-sub">${weekday}</div>
          </div>
          <button class="close-btn" onclick="closeSide()">✕</button>
        </div>
        <div class="side-scroll">`;

        if (events.length === 0) {
          html += `<div class="side-empty">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <span>Nenhum registro</span></div>`;
        } else {
          events.forEach((ev) => {
            const c = typeColor[ev.type] || "blue";
            html += `<div class="event-card ev-card-${c}">
            <div class="ev-top">
              <div class="ev-subject">${ev.subject || "—"}</div>
              <span class="ev-badge badge-${c}">${ev.type}</span>
            </div>
            <div class="ev-desc">${ev.text || ""}</div>
            ${isLeader ? `<button class="delete-btn" onclick="deleteEvent('${ev.id}')">Apagar</button>` : ""}
          </div>`;
          });
        }

        if (isLeader) {
          html += `<button class="add-btn" onclick="openModal()">＋ Adicionar</button>`;
        }

        html += `</div></div>`;
        side.innerHTML = html;
      }

      window.closeSide = closeSide;

      window.deleteEvent = async (id) => {
        await deleteDoc(doc(db, "events", id));
        await loadEvents();
        renderSide();
      };

      window.openModal = () =>
        document.getElementById("modal").classList.add("open");
      window.closeModal = () => {
        document.getElementById("modal").classList.remove("open");
        document.getElementById("type").value = "Prova";
        document.getElementById("subject").value = "";
        document.getElementById("text").value = "";
      };

      window.saveEvent = async () => {
        await addDoc(collection(db, "events"), {
          date: selectedDay,
          type: document.getElementById("type").value,
          subject: document.getElementById("subject").value,
          text: document.getElementById("text").value,
        });
        closeModal();
        await loadEvents();
        renderSide();
      };

      actionBtn.onclick = () => {
        if (isLeader) {
          isLeader = false;
          actionBtn.innerHTML = "🔒";
          actionBtn.style.background = "var(--blue)";
          if (side.classList.contains("active")) renderSide();
        } else {
          document.getElementById("loginModal").classList.add("open");
        }
      };

      window.login = () => {
        if (document.getElementById("password").value === "infoa") {
          isLeader = true;
          actionBtn.innerHTML = "🚪";
          actionBtn.style.background = "var(--green)";
          actionBtn.style.boxShadow = "0 4px 14px rgba(34,197,94,0.4)";
          closeLogin();
          if (side.classList.contains("active")) renderSide();
        } else {
          document.getElementById("password").style.borderColor = "var(--red)";
          setTimeout(
            () => (document.getElementById("password").style.borderColor = ""),
            1000,
          );
        }
      };

      window.closeLogin = () => {
        document.getElementById("loginModal").classList.remove("open");
        document.getElementById("password").value = "";
      };

      document.getElementById("password").addEventListener("keydown", (e) => {
        if (e.key === "Enter") window.login();
      });

      /* LOAD */
      async function loadEvents() {
        const snap = await getDocs(collection(db, "events"));
        eventsMap = {};
        snap.forEach((d) => {
          const v = d.data();
          if (!eventsMap[v.date]) eventsMap[v.date] = [];
          eventsMap[v.date].push({ ...v, id: d.id });
        });

        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const todayKey = `${today.getDate()}-${today.getMonth() + 1}`;

        document.querySelectorAll(".day").forEach((div) => {
          const key = div.dataset.date;
          if (!key) return;

          div.className = "day";

          const dotsEl = div.querySelector(".dots-row");
          if (dotsEl) dotsEl.innerHTML = "";

          if (eventsMap[key]) {
            const types = [...new Set(eventsMap[key].map((ev) => ev.type))];
            if (types.length === 1) {
              div.classList.add(`ev-${typeColor[types[0]]}`);
            } else {
              div.classList.add("ev-multi");
            }
            types.forEach((t) => {
              if (dotsEl) {
                const dot = document.createElement("div");
                dot.className = "dot";
                dot.style.background = dotColor[typeColor[t]] || "#fff";
                dotsEl.appendChild(dot);
              }
            });
          }

          const [day, month] = key.split("-");
          const date = new Date(2026, month - 1, day);
          if (date < today) div.classList.add("past");
          if (key === todayKey) div.classList.add("today-ring");
        });

        const m = today.getMonth(),
          d = today.getDate();
        openSide(todayKey, m, d);
      }

      loadEvents();
    </script>
  </body>
</html>
